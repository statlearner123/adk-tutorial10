# GitHub Actions CI/CD workflow for ADK Agent Testing
#
# HOW TO USE THIS FILE:
# 1. Push this repo to GitHub (see setup guide at the bottom of this file)
# 2. Go to Settings > Secrets and variables > Actions in your GitHub repo
# 3. Add secret: GOOGLE_API_KEY = <your Gemini API key>
# 4. Every push / PR will now run the full test suite automatically.
#
# Pipeline stages:
#   [Push/PR] → Fast Unit Tests (19 tests, ~5s, no API) → ✓ quick gate
#             → Evaluation Tests  (3 tests, ~60s, needs API key)

name: ADK Agent Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Fast unit tests — no API key needed, runs on every push
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (no API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true (TestToolFunctions + TestAgentConfiguration + TestIntegration)
        run: |
          pytest support_agent_tests/ \
            -k "not TestAgentEvaluation" \
            -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Evaluation tests — requires GOOGLE_API_KEY in repo secrets
  #         Only runs on push to main/master (not on every PR to save quota)
  # ────────────────────────────────────────────────────────────────────────────
  evaluation-tests:
    name: Evaluation Tests (Gemini API)
    runs-on: ubuntu-latest
    needs: unit-tests          # only run after unit tests pass
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation tests (AgentEvaluator with real Gemini API)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
        run: |
          pytest support_agent_tests/test_agent.py::TestAgentEvaluation \
            -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Optional: coverage report (add after unit-tests if wanted)
  # ────────────────────────────────────────────────────────────────────────────
